const { useState, useEffect, useCallback, useRef } = React;

if (!window.storage) {
  window.storage = {
    get: async (key) => {
      const v = localStorage.getItem(key);
      if (v === null) throw new Error("not found");
      return { key, value: v };
    },
    set: async (key, value) => {
      localStorage.setItem(key, value);
      return { key, value };
    },
    delete: async (key) => {
      localStorage.removeItem(key);
      return { key, deleted: true };
    },
  };
}

function IconBase({ children, size = 20, color, className = "" }) {
  return (
    <span
      className={className}
      style={{
        display: "inline-flex",
        alignItems: "center",
        justifyContent: "center",
        width: size,
        height: size,
        fontSize: Math.round(size * 0.78),
        lineHeight: 1,
        color: color || "currentColor",
      }}
    >
      {children}
    </span>
  );
}

const X = (p) => <IconBase {...p}>✕</IconBase>;
const Check = (p) => <IconBase {...p}>✓</IconBase>;
const RotateCcw = (p) => <IconBase {...p}>↺</IconBase>;

function makeCard(data, idx) {
  const now = Date.now();
  return {
    id: `${now}-${idx}-${Math.random().toString(36).slice(2, 7)}`,
    word: data.word,
    pos: data.pos || "",
    translation: data.translation,
    example: data.example || "",
    box: 0,
    nextReview: now,
    createdAt: now,
  };
}

const BOX_INTERVAL_DAYS = [0, 1, 3, 7, 14];
const DAY_MS = 24 * 60 * 60 * 1000;

async function loadCards() {
  try {
    const res = await window.storage.get("flashcards-v1");
    if (res && res.value) return JSON.parse(res.value);
  } catch (e) {
    // key doesn't exist yet
  }
  return null;
}

async function saveCards(cards) {
  try {
    await window.storage.set("flashcards-v1", JSON.stringify(cards));
  } catch (e) {
    console.error("Saqlashda xatolik:", e);
  }
}

async function getOrSeedCards() {
  let loaded = await loadCards();
  if (!loaded || loaded.length === 0) {
    loaded = SEED_CARDS.map((c, i) => makeCard(c, i));
    await saveCards(loaded);
  }
  return loaded;
}

async function loadXP() {
  try {
    const res = await window.storage.get("xp-v1");
    if (res && res.value) return parseInt(res.value, 10) || 0;
  } catch (e) {
    // none yet
  }
  return 0;
}

async function addXP(amount) {
  const current = await loadXP();
  const next = current + amount;
  try {
    await window.storage.set("xp-v1", String(next));
  } catch (e) {
    console.error("XP saqlashda xatolik:", e);
  }
  return next;
}

function levelFromXP(xp) {
  const level = Math.floor(xp / 100) + 1;
  const xpIntoLevel = xp % 100;
  return { level, xpIntoLevel, xpForNext: 100 };
}

const SPIRIT_PHRASES = [

function SpiritMascot({ pulse }) {
  const [phraseIdx, setPhraseIdx] = useState(0);
  const [show, setShow] = useState(false);

  useEffect(() => {
    if (pulse === undefined) return;
    setPhraseIdx(Math.floor(Math.random() * SPIRIT_PHRASES.length));
    setShow(true);
    const t = setTimeout(() => setShow(false), 2400);
    return () => clearTimeout(t);
  }, [pulse]);

  const handleTap = () => {
    setPhraseIdx(Math.floor(Math.random() * SPIRIT_PHRASES.length));
    setShow(true);
    setTimeout(() => setShow(false), 2400);
  };

  return (
    <div style={{ position: "absolute", bottom: 78, right: 14, zIndex: 30 }}>
      {show && (
        <div
          className="glass-strong"
          style={{
            position: "absolute",
            bottom: 52,
            right: 0,
            width: 168,
            padding: "8px 12px",
            borderRadius: 14,
            color: COLORS.text,
            fontFamily: "Manrope, sans-serif",
            fontSize: 12.5,
            boxShadow: "0 8px 24px rgba(0,0,0,0.35)",
          }}
        >
          {SPIRIT_PHRASES[phraseIdx]}
        </div>
      )}
      <button
        onClick={handleTap}
        className="glass-strong"
        style={{
          width: 46,
          height: 46,
          borderRadius: 9999,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          fontSize: 22,
          animation: "bounceSpirit 2.4s ease-in-out infinite",
          boxShadow: "0 6px 18px rgba(139,108,255,0.35)",
        }}
        aria-label="Spirit"
      >
        👻
      </button>
    </div>
  );
}

const COUNTER_KEY = "lexify_uzb_app_users_v1";

async function hitUserCounter() {
  try {
    const already = localStorage.getItem("lexify-counted-v1");
    if (already) return null;
    const res = await fetch(`https://countapi.mileshilliard.com/api/v1/hit/${COUNTER_KEY}`);
    const data = await res.json();
    localStorage.setItem("lexify-counted-v1", "1");
    return data.value;
  } catch (e) {
    return null;
  }
}

async function getUserCounter() {
  try {
    const res = await fetch(`https://countapi.mileshilliard.com/api/v1/get/${COUNTER_KEY}`);
    const data = await res.json();
    return data.value;
  } catch (e) {
    return null;
  }
}

function todayKey() {
  const d = new Date();
  return `lexify_uzb_active_${d.getFullYear()}_${d.getMonth() + 1}_${d.getDate()}`;
}

async function hitAndGetActiveToday() {
  try {
    const key = todayKey();
    const flag = `lexify-active-flag-${key}`;
    if (!localStorage.getItem(flag)) {
      await fetch(`https://countapi.mileshilliard.com/api/v1/hit/${key}`);
      localStorage.setItem(flag, "1");
    }
    const res = await fetch(`https://countapi.mileshilliard.com/api/v1/get/${key}`);
    const data = await res.json();
    return data.value;
  } catch (e) {
    return null;
  }
}

function WelcomeScreen({ onDone }) {
  const [name, setName] = useState("");
  const canContinue = name.trim().length > 0;


  const handleContinue = async () => {
    if (!canContinue) return;
    const trimmed = name.trim();
    await saveUserName(trimmed);
    hitUserCounter();
    onDone(trimmed);
  };

  return (
    <div className="flex-1 flex flex-col items-center justify-center px-8 text-center gap-6">
      <div>
        <span style={{ fontFamily: "Fraunces, serif", color: COLORS.teal }} className="text-4xl font-semibold">
          Lexify

        <p style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }} className="text-sm mt-2">
          Ingliz tilini kuchaytirishni birga boshlaymiz
        </p>
      </div>

      <div className="w-full flex flex-col gap-3">
        <p style={{ color: COLORS.text, fontFamily: "Manrope, sans-serif" }} className="text-base">
          Ismingiz nima?
        </p>
        <input
          value={name}
          onChange={(e) => setName(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && handleContinue()}

          autoFocus
          className="w-full rounded-xl px-4 py-3 outline-none text-center text-lg"
          style={{ background: COLORS.surface, color: COLORS.text, border: `1px solid ${COLORS.border}`, fontFamily: "Manrope, sans-serif" }}
        />
        <button
          onClick={handleContinue}
          disabled={!canContinue}
          className="w-full rounded-xl py-3.5 font-semibold"

            background: canContinue ? COLORS.teal : COLORS.border,

  const [cards, setCards] = useState(null);

  const [showAdd, setShowAdd] = useState(false);
  const [sessionDone, setSessionDone] = useState(0);

  useEffect(() => {
    (async () => {
      const loaded = await getOrSeedCards();
      setCards(loaded);
    })();
  }, []);

  useEffect(() => {
    if (!cards) return;
    const now = Date.now();
    const due = cards.filter((c) => c.nextReview <= now).sort((a, b) => a.nextReview - b.nextReview);
    setQueue(due);
  }, [cards]);

  const current = queue[0];

  const persist = useCallback((next) => {
    setCards(next);
    saveCards(next);
  }, []);

  const handleAnswer = (knew) => {
    if (!current || !cards) return;
    const now = Date.now();
    const next = cards.map((c) => {
      if (c.id !== current.id) return c;
      const newBox = knew ? Math.min(c.box + 1, BOX_INTERVAL_DAYS.length - 1) : 0;
      const days = BOX_INTERVAL_DAYS[newBox];
      return { ...c, box: newBox, nextReview: now + days * DAY_MS };
    });
    persist(next);
    if (knew && onGainXP) onGainXP(5);
    setQueue((q) => q.slice(1));
    setFlipped(false);
    setSessionDone((n) => n + 1);
  };

  const handleAdd = (data) => {
    if (!cards) return;
    const next = [...cards, makeCard(data, cards.length)];

async function callGeminiAPI({ system, parts, maxOutputTokens }) {
  const response = await fetch("/api/gemini", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ system, parts, maxOutputTokens }),
  });
  if (!response.ok) {
    const errBody = await response.json().catch(() => ({}));
    const err = new Error((errBody.error && errBody.error.message) || `API xatosi (${response.status})`);
    err.code = "API_ERROR";
    throw err;
  }
  const data = await response.json();
  const candidate = data.candidates && data.candidates[0];
  const outParts = candidate && candidate.content && candidate.content.parts;
  if (!outParts) {
    const err = new Error("Bo'sh javob qaytdi. Qaytadan urinib ko'ring.");
    err.code = "API_ERROR";
    throw err;
  }
  return outParts.map((p) => p.text || "").join("");
}

async function lookupWordInContext(word, articleText) {
  const system = `Sen ingliz tili lug'at yordamchisisan. Foydalanuvchi katta matn ichidan bitta so'zni bosadi, sen shu so'zning aynan shu matn kontekstidagi ma'nosini tushuntirasan. FAQAT quyidagi JSON formatida javob ber, boshqa hech narsa yozma:
{"word": "<berilgan so'z, boshlang'ich shakli bilan>", "partOfSpeech": "<so'z turkumi o'zbekcha: ot, fe'l, sifat, ravish va h.k.>", "meaning": "<so'zning ushbu matndagi aniq ma'nosi, o'zbek tilidagi qisqa tarjima>", "note": "<agar so'z ko'p ma'noli bo'lib shu yerda alohida ma'noda kelayotgan bo'lsa, shuni 1 gapda tushuntir, aks holda bo'sh string qoldir>"}`;

  const raw = await callGeminiAPI({
    system,
    maxOutputTokens: 400,
    parts: [
      {
        text: `Matn: """${articleText}"""\n\nBosilgan so'z: "${word}"\n\nShu so'zning ushbu matn kontekstidagi ma'nosini tushuntir.`,
      },
    ],
  });

  const clean = raw.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

function tokenizeArticle(text) {
  return text.split(/([A-Za-z][A-Za-z'-]*)/g).filter((t) => t.length > 0);
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = () => reject(new Error("Rasmni o'qib bo'lmadi"));
    reader.readAsDataURL(file);
  });
}

async function checkWriting({ text, examType, imageBase64, imageMediaType }) {
  const parts = [];
  if (imageBase64) {
    parts.push({ inline_data: { mime_type: imageMediaType, data: imageBase64 } });
  }
  parts.push({ text: text.trim() || "Rasmdagi ingliz tilidagi matnni o'qib, tekshirib ber." });

  const raw = await callGeminiAPI({
    system: buildSystemPrompt(examType),
    maxOutputTokens: 1200,
    parts,
  });

  const clean = raw.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

          style={{ background: COLORS.surfaceAlt, color: COLORS.textDim, border: `1px dashed ${COLORS.border}`, fontFamily: "Manrope, sans-serif" }}

          <ImageIcon size={18} /> Javob rasmini yuklash
        </button>
      )}
      <input ref={fileInputRef} type="file" accept="image/*" capture="environment" onChange={handleFileChange} className="hidden" />

      <button
        onClick={handleCheck}
        disabled={!canCheck}
        className="mt-4 rounded-xl py-3.5 font-semibold flex items-center justify-center gap-2"
        style={{
          background: canCheck ? COLORS.teal : COLORS.border,
          color: canCheck ? "#0B1020" : COLORS.textDim,
          fontFamily: "Manrope, sans-serif",
        }}
      >
        {loading ? <Loader2 className="animate-spin" size={18} /> : <Sparkles size={18} />}
        {loading ? "Tekshirilmoqda..." : "Tekshirish"}
      </button>

      {error && (
        <p className="mt-4 text-sm" style={{ color: COLORS.coral, fontFamily: "Manrope, sans-serif" }}>{error}</p>
      )}

      {result && (
        <div className="mt-5 flex flex-col gap-4">
          {result.transcribed && (
            <div className="rounded-xl p-3" style={{ background: COLORS.surfaceAlt, border: `1px solid ${COLORS.border}` }}>
              <h3 style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }} className="text-xs font-semibold mb-1">Rasmdan o'qilgan matn</h3>
              <p className="text-sm" style={{ color: COLORS.text, fontFamily: "Manrope, sans-serif" }}>{result.transcribed}</p>
            </div>
          )}

          <div className="flex items-center gap-3">
            <div
              className="rounded-full flex items-center justify-center font-bold"
              style={{ width: 56, height: 56, background: COLORS.surfaceAlt, color: COLORS.amber, fontFamily: "Fraunces, serif", fontSize: 18 }}
            >
              {result.score}
            </div>
            <div className="flex-1">
              {result.level && (
                <p style={{ color: COLORS.teal, fontFamily: "Manrope, sans-serif" }} className="text-sm font-semibold">
                  Daraja: {result.level}
                </p>
              )}
              <p style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }} className="text-sm">
                {result.summary}
              </p>
            </div>
          </div>

          {result.errors && result.errors.length > 0 && (
            <div className="flex flex-col gap-2">
              <h3 style={{ color: COLORS.text, fontFamily: "Manrope, sans-serif" }} className="text-sm font-semibold">Xatolar</h3>
              {result.errors.map((err, i) => (
                <div key={i} className="rounded-xl p-3" style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}` }}>
                  <p className="text-sm" style={{ fontFamily: "Manrope, sans-serif" }}>
                    <span style={{ color: COLORS.coral, textDecoration: "line-through" }}>{err.original}</span>
                    {"  →  "}
                    <span style={{ color: COLORS.teal, fontWeight: 600 }}>{err.fix}</span>
                  </p>
                  <p className="text-xs mt-1" style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }}>{err.explanation}</p>
                </div>
              ))}
            </div>
          )}

          <div>
            <h3 style={{ color: COLORS.text, fontFamily: "Manrope, sans-serif" }} className="text-sm font-semibold mb-2">To'g'irlangan matn</h3>
            <div className="rounded-xl p-3" style={{ background: COLORS.surfaceAlt, border: `1px solid ${COLORS.border}` }}>
              <p className="text-sm" style={{ color: COLORS.text, fontFamily: "Manrope, sans-serif" }}>{result.corrected}</p>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

async function loadQuizRecord() {
  try {
    const res = await window.storage.get("quiz-record-v1");
    if (res && res.value) return JSON.parse(res.value).record || 0;
  } catch (e) {
    // no record yet
  }
  return 0;
}

async function saveQuizRecord(record) {
  try {
    await window.storage.set("quiz-record-v1", JSON.stringify({ record }));
  } catch (e) {
    console.error("Rekordni saqlashda xatolik:", e);
  }
}

function buildQuizQuestions(cards) {
  const shuffledCards = shuffleArray(cards);
  const length = Math.min(shuffledCards.length, 20);
  const selected = shuffledCards.slice(0, length);

  return selected.map((card) => {
    const pool = cards
      .filter((c) => c.id !== card.id && c.translation !== card.translation)
      .map((c) => c.translation);
    const distractors = shuffleArray(pool).slice(0, 3);
    const options = shuffleArray([card.translation, ...distractors]);
    return { word: card.word, pos: card.pos, correct: card.translation, options };
  });
}

const OPTION_LETTERS = ["A", "B", "C", "D"];

function QuizView({ onGainXP }) {
  const [cards, setCards] = useState(null);
  const [quiz, setQuiz] = useState(null);
  const [idx, setIdx] = useState(0);
  const [score, setScore] = useState(0);
  const [record, setRecord] = useState(0);
  const [selected, setSelected] = useState(null);
  const [locked, setLocked] = useState(false);
  const [finished, setFinished] = useState(false);

  const startQuiz = useCallback((cardList) => {
    setQuiz(buildQuizQuestions(cardList));
    setIdx(0);
    setScore(0);
    setSelected(null);
    setLocked(false);
    setFinished(false);
  }, []);

  useEffect(() => {
    (async () => {
      const loaded = await getOrSeedCards();
      const rec = await loadQuizRecord();
      setRecord(rec);
      setCards(loaded);
      if (loaded.length >= 4) startQuiz(loaded);
    })();
  }, [startQuiz]);

  const current = quiz && quiz[idx];

  const handleSelect = (option) => {
    if (locked || !current) return;
    setSelected(option);
    setLocked(true);
    const isCorrect = option === current.correct;
    const newScore = isCorrect ? score + 1 : score;
    if (isCorrect) {
      setScore(newScore);
      if (onGainXP) onGainXP(10);
    }

    setTimeout(async () => {
      if (idx + 1 < quiz.length) {
        setIdx((i) => i + 1);
        setSelected(null);
        setLocked(false);
      } else {
        if (newScore > record) {
          setRecord(newScore);
          await saveQuizRecord(newScore);
        }
        setFinished(true);
      }
    }, 800);
  };

  if (cards === null) {
    return (
      <div className="flex-1 flex items-center justify-center">
        <Loader2 className="animate-spin" color={COLORS.textDim} size={28} />
      </div>
    );
  }

  if (cards.length < 4) {
    return (
      <div className="flex-1 flex flex-col items-center justify-center text-center gap-3 px-6">
        <div className="rounded-full p-4" style={{ background: COLORS.surfaceAlt }}>
          <HelpCircle color={COLORS.teal} size={28} />
        </div>
        <p style={{ fontFamily: "Fraunces, serif", color: COLORS.text }} className="text-lg">
          Test uchun so'z yetarli emas
        </p>
        <p style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }} className="text-sm max-w-xs">
          Test boshlash uchun Lug'at bo'limida kamida 4 ta so'z bo'lishi kerak. Hozir {cards.length} ta so'zingiz bor.
        </p>
      </div>
    );
  }

  return (
    <div className="flex-1 flex flex-col px-5 pt-3 pb-4">
      <h1 style={{ fontFamily: "Fraunces, serif", color: COLORS.text }} className="text-2xl mb-4">Test</h1>

      {!finished && current && (
        <>
          <div className="flex gap-3 mb-3">
            <div className="flex-1 rounded-2xl p-3" style={{ background: COLORS.surfaceAlt }}>
              <p style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }} className="text-xs">To'g'ri javob</p>
              <p style={{ color: COLORS.text, fontFamily: "Manrope, sans-serif" }} className="text-2xl font-bold">{score}</p>
            </div>
            <div className="flex-1 rounded-2xl p-3" style={{ background: COLORS.teal }}>
              <p style={{ color: "#0B1020", fontFamily: "Manrope, sans-serif" }} className="text-xs opacity-80">Rekord</p>
              <p style={{ color: "#0B1020", fontFamily: "Manrope, sans-serif" }} className="text-2xl font-bold">{record}</p>
            </div>
          </div>
          <p style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }} className="text-sm text-center mb-4">
            Savol: {idx + 1}/{quiz.length}
          </p>

          <div className="rounded-2xl p-6 mb-5 flex flex-col items-center gap-2" style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}` }}>
            {current.pos && (
              <span
                className="text-xs px-3 py-1 rounded-full font-medium"
                style={{ background: COLORS.surfaceAlt, color: COLORS.amber, fontFamily: "Manrope, sans-serif" }}
              >
                {current.pos}
              </span>
            )}
            <span style={{ fontFamily: "Fraunces, serif", color: COLORS.text }} className="text-3xl text-center mt-1">
              {current.word}
            </span>
          </div>

          <div className="flex flex-col gap-3">
            {current.options.map((opt, i) => {
              const isCorrectOpt = opt === current.correct;
              const isSelectedOpt = opt === selected;
              let bg = COLORS.surfaceAlt;
              let border = COLORS.border;
              if (locked && isCorrectOpt) {
                bg = "rgba(47,217,196,0.16)";
                border = COLORS.teal;
              } else if (locked && isSelectedOpt && !isCorrectOpt) {
                bg = "rgba(242,101,125,0.16)";
                border = COLORS.coral;
              }
              return (
                <button
                  key={i}
                  onClick={() => handleSelect(opt)}
                  disabled={locked}
                  className="w-full rounded-2xl p-4 flex items-center gap-3 text-left"
                  style={{ background: bg, border: `1px solid ${border}` }}
                >
                  <span
                    className="rounded-lg w-8 h-8 flex items-center justify-center font-bold text-sm shrink-0"
                    style={{ background: COLORS.bg, color: COLORS.text, fontFamily: "Manrope, sans-serif" }}
                  >
                    {OPTION_LETTERS[i]}
                  </span>
                  <span style={{ color: COLORS.text, fontFamily: "Manrope, sans-serif" }} className="text-base">
                    {opt}
                  </span>
                </button>
              );
            })}
          </div>
        </>
      )}

      {finished && (
        <div className="flex-1 flex flex-col items-center justify-center text-center gap-3">
          <div className="rounded-full p-4" style={{ background: COLORS.surfaceAlt }}>
            <Check color={COLORS.teal} size={28} />
          </div>
          <p style={{ fontFamily: "Fraunces, serif", color: COLORS.text }} className="text-2xl">
            {score}/{quiz.length} to'g'ri
          </p>
          <p style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }} className="text-sm">
            {score > record ? "Yangi rekord qo'ydingiz! 🎉" : `Rekordingiz: ${record}`}
          </p>
          <button
            onClick={() => startQuiz(cards)}
            className="mt-3 rounded-xl px-6 py-3 font-semibold flex items-center gap-2"
            style={{ background: COLORS.teal, color: "#0B1020", fontFamily: "Manrope, sans-serif" }}
          >
            Qayta boshlash
          </button>
        </div>
      )}
    </div>
  );
}


function CosmicBackground() {
  const stars = React.useMemo(
    () =>
      Array.from({ length: 26 }, (_, i) => ({
        id: i,
        top: Math.random() * 100,
        left: Math.random() * 100,
        delay: Math.random() * 3,
        size: Math.random() > 0.8 ? 3 : 2,
      })),
    []
  );
  return (
    <div className="cosmic-bg">
      <div className="cosmic-blob blob-a" />
      <div className="cosmic-blob blob-b" />
      <div className="cosmic-blob blob-c" />
      {stars.map((s) => (
        <span
          key={s.id}
          className="star"
          style={{ top: `${s.top}%`, left: `${s.left}%`, width: s.size, height: s.size, animationDelay: `${s.delay}s` }}
        />
      ))}
    </div>
  );
}

  const [showSettings, setShowSettings] = useState(false);
  const [xp, setXp] = useState(0);
  const [activeToday, setActiveToday] = useState(null);
  const [pulse, setPulse] = useState(undefined);

  useEffect(() => {
    (async () => {
      const name = await loadUserName();
      setUserName(name || null);
      const currentXp = await loadXP();
      setXp(currentXp);
      const active = await hitAndGetActiveToday();
      if (active !== null) setActiveToday(active);
    })();
  }, []);

  const gainXP = useCallback(async (amount) => {
    const next = await addXP(amount);
    setXp(next);
    setPulse(Date.now());
  }, []);

  if (userName === undefined) {
    return (
      <div className="w-full flex justify-center items-center relative" style={{ minHeight: 640 }}>
        <style>{FONT_STYLE}</style>
        <CosmicBackground />
        <Loader2 className="animate-spin" color={COLORS.textDim} size={28} />
      </div>
    );
  }

  return (
    <div className="w-full flex justify-center relative" style={{ minHeight: 640 }}>
      <style>{FONT_STYLE}</style>
      <CosmicBackground />
      <div
        className="w-full max-w-sm flex flex-col glass-strong relative"
        style={{ minHeight: 640, maxHeight: 860, zIndex: 5, borderRadius: 0, overflow: "hidden" }}
      >
        {userName === null ? (
          <WelcomeScreen onDone={(name) => setUserName(name)} />
        ) : (
          <>
            <Header userName={userName} onOpenSettings={() => setShowSettings(true)} xp={xp} activeToday={activeToday} />
            <div className="flex-1 flex flex-col relative" style={{ minHeight: 0 }}>
              {tab === "cards" && <FlashcardsView onGainXP={gainXP} />}
              {tab === "article" && <ArticlesView />}
              {tab === "quiz" && <QuizView onGainXP={gainXP} />}
              {tab === "write" && <WritingView />}
              <SpiritMascot pulse={pulse} />
            </div>

            <div className="flex glass" style={{ borderTop: `1px solid ${COLORS.border}` }}>
              <Tab active={tab === "cards"} onClick={() => setTab("cards")} icon={<Layers size={20} />} label="Lug'at" />
              <Tab active={tab === "article"} onClick={() => setTab("article")} icon={<BookOpen size={20} />} label="Maqola" />
              <Tab active={tab === "quiz"} onClick={() => setTab("quiz")} icon={<HelpCircle size={20} />} label="Test" />
              <Tab active={tab === "write"} onClick={() => setTab("write")} icon={<PenLine size={20} />} label="Yozuv" />
            </div>
            {showSettings && <SettingsModal onClose={() => setShowSettings(false)} />}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
