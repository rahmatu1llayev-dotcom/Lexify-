<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

if (!window.storage) {
  window.storage = {
    get: async (key) => {
      const v = localStorage.getItem(key);
      if (v === null) throw new Error("not found");
      return { key, value: v };
    },
    set: async (key, value) => {
      localStorage.setItem(key, value);
      return { key, value };
    },
    delete: async (key) => {
      localStorage.removeItem(key);
      return { key, deleted: true };
    },
  };
}

function IconBase({ children, size = 20, color, className = "" }) {
  return (
    <span
      className={className}
      style={{
        display: "inline-flex",
        alignItems: "center",
        justifyContent: "center",
        width: size,
        height: size,
        fontSize: Math.round(size * 0.78),
        lineHeight: 1,
        color: color || "currentColor",
      }}
    >
      {children}
    </span>
  );
}
const Plus = (p) => <IconBase {...p}>+</IconBase>;
const X = (p) => <IconBase {...p}>✕</IconBase>;
const Check = (p) => <IconBase {...p}>✓</IconBase>;
const RotateCcw = (p) => <IconBase {...p}>↺</IconBase>;
const PenLine = (p) => <IconBase {...p}>✎</IconBase>;
const Layers = (p) => <IconBase {...p}>▤</IconBase>;
const Sparkles = (p) => <IconBase {...p}>✨</IconBase>;
const Loader2 = (p) => <IconBase {...p} className={`${p.className || ""} spin`}>⟳</IconBase>;
const ImageIcon = (p) => <IconBase {...p}>🖼</IconBase>;
const BookOpen = (p) => <IconBase {...p}>📖</IconBase>;
const HelpCircle = (p) => <IconBase {...p}>❓</IconBase>;

@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap');

  { word: "abundant", pos: "sifat", translation: "mo'l-ko'l, serob", example: "The region has abundant natural resources." },

  { word: "diligent", pos: "sifat", translation: "tirishqoq, mehnatsevar", example: "She is a diligent student who never skips homework." },
  { word: "eloquent", pos: "sifat", translation: "notiq, ravon gapiruvchi", example: "He gave an eloquent speech about freedom." },
  { word: "feasible", pos: "sifat", translation: "amalga oshirish mumkin bo'lgan", example: "Is it feasible to finish this by Friday?" },
  { word: "hinder", pos: "fe'l", translation: "to'sqinlik qilmoq, xalaqit bermoq", example: "Bad weather hindered our progress." },
  { word: "inevitable", pos: "sifat", translation: "muqarrar, sodir bo'lishi aniq", example: "Change is inevitable in a growing company." },
  { word: "meticulous", pos: "sifat", translation: "juda ehtiyotkor, puxta", example: "She is meticulous about checking every detail." },
  { word: "notion", pos: "ot", translation: "tushuncha, fikr", example: "I have no notion of what he means." },

function makeCard(data, idx) {
  const now = Date.now();
  return {
    id: `${now}-${idx}-${Math.random().toString(36).slice(2, 7)}`,
    word: data.word,
    pos: data.pos || "",
    translation: data.translation,
    example: data.example || "",
    box: 0,
    nextReview: now,
    createdAt: now,
  };
}

const BOX_INTERVAL_DAYS = [0, 1, 3, 7, 14];
const DAY_MS = 24 * 60 * 60 * 1000;

async function loadCards() {
  try {
    const res = await window.storage.get("flashcards-v1");
    if (res && res.value) return JSON.parse(res.value);
  } catch (e) {
    // key doesn't exist yet
  }
  return null;
}

async function saveCards(cards) {
  try {
    await window.storage.set("flashcards-v1", JSON.stringify(cards));
  } catch (e) {
    console.error("Saqlashda xatolik:", e);
  }
}

async function getOrSeedCards() {
  let loaded = await loadCards();
  if (!loaded || loaded.length === 0) {
    loaded = SEED_CARDS.map((c, i) => makeCard(c, i));
    await saveCards(loaded);
  }
  return loaded;
}

async function loadUserName() {
  try {
    const res = await window.storage.get("user-name-v1");
    if (res && res.value) return res.value;
  } catch (e) {
    // not set yet
  }
  return null;
}

async function saveUserName(name) {
  try {
    await window.storage.set("user-name-v1", name);
  } catch (e) {
    console.error("Ismni saqlashda xatolik:", e);

}

function SettingsModal({ onClose }) {
  const [key, setKey] = useState("");
  const [saved, setSaved] = useState(false);
  const [hasExisting, setHasExisting] = useState(false);

  useEffect(() => {
    (async () => {
      const existing = await getApiKey();
      if (existing) setHasExisting(true);
    })();
  }, []);

  const handleSave = async () => {
    if (!key.trim()) return;
    await saveApiKey(key.trim());
    setSaved(true);
    setHasExisting(true);
    setTimeout(() => onClose(), 900);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center" style={{ background: "rgba(8,10,22,0.6)" }} onClick={onClose}>
      <div
        className="w-full max-w-md rounded-t-3xl p-5 pb-8"
        style={{ background: COLORS.surface, borderTop: `1px solid ${COLORS.border}` }}
        onClick={(e) => e.stopPropagation()}
      >
        <div className="flex items-center justify-between mb-3">
          <h2 style={{ fontFamily: "Fraunces, serif", color: COLORS.text }} className="text-xl">Sozlamalar</h2>
          <button onClick={onClose} style={{ color: COLORS.textDim }}><X size={22} /></button>
        </div>

        <p style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }} className="text-sm mb-3">
          Yozuv tekshiruvchisi va Maqoladagi so'z izohi ishlashi uchun Anthropic API kalitingizni kiriting.{" "}
          <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noreferrer" style={{ color: COLORS.teal }}>
            Kalit olish
          </a>
        </p>

        {hasExisting && !saved && (
          <p style={{ color: COLORS.teal, fontFamily: "Manrope, sans-serif" }} className="text-xs mb-2">
            ✓ Kalit sozlangan. Yangilash uchun pastga kiriting.
          </p>
        )}

        <input
          value={key}
          onChange={(e) => setKey(e.target.value)}
          placeholder="sk-ant-..."
          type="password"
          className="w-full rounded-xl px-4 py-3 outline-none"
          style={{ background: COLORS.surfaceAlt, color: COLORS.text, border: `1px solid ${COLORS.border}`, fontFamily: "Manrope, sans-serif" }}
        />

        <button
          onClick={handleSave}
          disabled={!key.trim()}
          className="w-full mt-4 rounded-xl py-3 font-semibold"
          style={{
            background: key.trim() ? COLORS.teal : COLORS.border,
            color: key.trim() ? "#0B1020" : COLORS.textDim,
            fontFamily: "Manrope, sans-serif",
          }}
        >
          {saved ? "Saqlandi ✓" : "Saqlash"}
        </button>
      </div>
    </div>
  );
}

function FlashcardsView() {
  const [cards, setCards] = useState(null);
  const [queue, setQueue] = useState([]);
  const [flipped, setFlipped] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [sessionDone, setSessionDone] = useState(0);

  useEffect(() => {
    (async () => {
      const loaded = await getOrSeedCards();
      setCards(loaded);
    })();
  }, []);

  useEffect(() => {
    if (!cards) return;
    const now = Date.now();
    const due = cards.filter((c) => c.nextReview <= now).sort((a, b) => a.nextReview - b.nextReview);
    setQueue(due);
  }, [cards]);

  const current = queue[0];

  const persist = useCallback((next) => {
    setCards(next);
    saveCards(next);
  }, []);

  const handleAnswer = (knew) => {
    if (!current || !cards) return;
    const now = Date.now();
    const next = cards.map((c) => {
      if (c.id !== current.id) return c;
      const newBox = knew ? Math.min(c.box + 1, BOX_INTERVAL_DAYS.length - 1) : 0;
      const days = BOX_INTERVAL_DAYS[newBox];
      return { ...c, box: newBox, nextReview: now + days * DAY_MS };
    });
    persist(next);
    setQueue((q) => q.slice(1));
    setFlipped(false);
    setSessionDone((n) => n + 1);
  };

  const handleAdd = (data) => {
    if (!cards) return;
    const next = [...cards, makeCard(data, cards.length)];
    persist(next);
  };

  const learnedCount = cards ? cards.filter((c) => c.box === BOX_INTERVAL_DAYS.length - 1).length : 0;

  return (
    <div className="flex-1 flex flex-col px-5 pt-3 pb-4">
      <div className="flex items-center justify-between mb-5">
        <div>
          <h1 style={{ fontFamily: "Fraunces, serif", color: COLORS.text }} className="text-2xl">Lug'at</h1>
          <p style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }} className="text-sm">
            {cards ? `${cards.length} so'z · ${learnedCount} o'zlashtirilgan` : "Yuklanmoqda..."}
          </p>
        </div>
        <button
          onClick={() => setShowAdd(true)}
          className="rounded-full p-3"
          style={{ background: COLORS.surfaceAlt, border: `1px solid ${COLORS.border}` }}
        >
          <Plus size={20} color={COLORS.teal} />
        </button>
      </div>

      {!cards && (
        <div className="flex-1 flex items-center justify-center">
          <Loader2 className="animate-spin" color={COLORS.textDim} size={28} />
        </div>
      )}

      {cards && !current && (
        <div className="flex-1 flex flex-col items-center justify-center text-center gap-3">
          <div className="rounded-full p-4" style={{ background: COLORS.surfaceAlt }}>
            <Check color={COLORS.teal} size={28} />
          </div>
          <p style={{ fontFamily: "Fraunces, serif", color: COLORS.text }} className="text-lg">
            Hozircha takrorlash uchun so'z yo'q
          </p>
          <p style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }} className="text-sm max-w-xs">
            Barcha so'zlaringiz takrorlangan. Yangi so'z qo'shing yoki keyinroq qayting.
          </p>
          {sessionDone > 0 && (
            <p style={{ color: COLORS.amber, fontFamily: "Manrope, sans-serif" }} className="text-sm font-semibold">
              Bu seansda {sessionDone} ta so'z takrorlandi 🎉
            </p>
          )}
        </div>
      )}

      {current && (
        <div className="flex-1 flex flex-col">
          <div className="flex-1 flex items-center justify-center">
            <div
              onClick={() => setFlipped((f) => !f)}
              className="w-full max-w-sm rounded-2xl p-6 relative cursor-pointer select-none"
              style={{
                background: COLORS.surface,
                border: `1px solid ${COLORS.border}`,
                borderLeft: `3px dashed ${COLORS.border}`,
                minHeight: 220,
              }}
            >
              <div
                className="absolute -top-3 left-5 px-2 py-0.5 rounded text-xs font-semibold"
                style={{ background: COLORS.bg, color: COLORS.textDim, border: `1px solid ${COLORS.border}`, fontFamily: "Manrope, sans-serif" }}
              >
                №{String(queue.length).padStart(3, "0")} qoldi
              </div>

              {!flipped ? (
                <div className="h-full flex flex-col items-center justify-center gap-3 py-6">
                  <span style={{ fontFamily: "Fraunces, serif", color: COLORS.text }} className="text-4xl text-center">
                    {current.word}
                  </span>
                  {current.pos && (
                    <span
                      className="text-xs px-3 py-1 rounded-full font-medium"
                      style={{ background: COLORS.surfaceAlt, color: COLORS.amber, transform: "rotate(-2deg)", fontFamily: "Manrope, sans-serif" }}
                    >
                      {current.pos}
                    </span>
                  )}
                  <span style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }} className="text-xs mt-2">
                    Ma'nosini ko'rish uchun bosing
                  </span>
                </div>
              ) : (
                <div className="h-full flex flex-col justify-center gap-3 py-4">
                  <span style={{ fontFamily: "Fraunces, serif", color: COLORS.teal }} className="text-2xl">
                    {current.translation}
                  </span>
                  {current.example && (
                    <p style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }} className="text-sm italic border-t pt-3">
                      "{current.example}"
                    </p>
                  )}
                </div>
              )}
            </div>
          </div>

          {flipped && (
            <div className="flex gap-3 mt-4">
              <button
                onClick={() => handleAnswer(false)}
                className="flex-1 rounded-xl py-4 font-semibold flex items-center justify-center gap-2"
                style={{ background: "rgba(242,101,125,0.12)", color: COLORS.coral, fontFamily: "Manrope, sans-serif" }}
              >
                <RotateCcw size={18} /> Bilmadim
              </button>
              <button
                onClick={() => handleAnswer(true)}
                className="flex-1 rounded-xl py-4 font-semibold flex items-center justify-center gap-2"
                style={{ background: "rgba(47,217,196,0.14)", color: COLORS.teal, fontFamily: "Manrope, sans-serif" }}
              >
                <Check size={18} /> Bilaman
              </button>
            </div>
          )}
        </div>
      )}

      {showAdd && <AddWordModal onClose={() => setShowAdd(false)} onAdd={handleAdd} />}
    </div>
  );
}

async function callClaudeAPI({ system, messages, max_tokens }) {
  const key = await getApiKey();
  if (!key) {
    const err = new Error("NO_API_KEY");
    err.code = "NO_API_KEY";
    throw err;
  }
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({ model: "claude-sonnet-5", max_tokens: max_tokens || 1000, system, messages }),
  });
  if (!response.ok) {
    const errBody = await response.json().catch(() => ({}));
    const err = new Error((errBody.error && errBody.error.message) || `API xatosi (${response.status})`);
    err.code = "API_ERROR";
    throw err;
  }
  return response.json();
}

async function lookupWordInContext(word, articleText) {
  const system = `Sen ingliz tili lug'at yordamchisisan. Foydalanuvchi katta matn ichidan bitta so'zni bosadi, sen shu so'zning aynan shu matn kontekstidagi ma'nosini tushuntirasan. FAQAT quyidagi JSON formatida javob ber, boshqa hech narsa yozma:
{"word": "<berilgan so'z, boshlang'ich shakli bilan>", "partOfSpeech": "<so'z turkumi o'zbekcha: ot, fe'l, sifat, ravish va h.k.>", "meaning": "<so'zning ushbu matndagi aniq ma'nosi, o'zbek tilidagi qisqa tarjima>", "note": "<agar so'z ko'p ma'noli bo'lib shu yerda alohida ma'noda kelayotgan bo'lsa, shuni 1 gapda tushuntir, aks holda bo'sh string qoldir>"}`;

  const data = await callClaudeAPI({
    system,
    max_tokens: 400,
    messages: [
      {
        role: "user",
        content: `Matn: """${articleText}"""\n\nBosilgan so'z: "${word}"\n\nShu so'zning ushbu matn kontekstidagi ma'nosini tushuntir.`,
      },
    ],
  });

  const raw = (data.content || []).map((b) => b.text || "").join("");
  const clean = raw.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

function tokenizeArticle(text) {
  return text.split(/([A-Za-z][A-Za-z'-]*)/g).filter((t) => t.length > 0);
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = () => reject(new Error("Rasmni o'qib bo'lmadi"));
    reader.readAsDataURL(file);
  });
}

async function checkWriting({ text, examType, imageBase64, imageMediaType }) {
  const content = [];
  if (imageBase64) {
    content.push({ type: "image", source: { type: "base64", media_type: imageMediaType, data: imageBase64 } });
  }
  content.push({ type: "text", text: text.trim() || "Rasmdagi ingliz tilidagi matnni o'qib, tekshirib ber." });

  const data = await callClaudeAPI({
    system: buildSystemPrompt(examType),
    max_tokens: 1200,
    messages: [{ role: "user", content }],
  });

  const raw = (data.content || []).map((b) => b.text || "").join("");
  const clean = raw.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

async function loadQuizRecord() {
  try {
    const res = await window.storage.get("quiz-record-v1");
    if (res && res.value) return JSON.parse(res.value).record || 0;
  } catch (e) {
    // no record yet
  }
  return 0;
}

async function saveQuizRecord(record) {
  try {
    await window.storage.set("quiz-record-v1", JSON.stringify({ record }));
  } catch (e) {
    console.error("Rekordni saqlashda xatolik:", e);
  }
}

function buildQuizQuestions(cards) {
  const shuffledCards = shuffleArray(cards);
  const length = Math.min(shuffledCards.length, 20);
  const selected = shuffledCards.slice(0, length);

  return selected.map((card) => {
    const pool = cards
      .filter((c) => c.id !== card.id && c.translation !== card.translation)
      .map((c) => c.translation);
    const distractors = shuffleArray(pool).slice(0, 3);
    const options = shuffleArray([card.translation, ...distractors]);
    return { word: card.word, pos: card.pos, correct: card.translation, options };
  });
}

function QuizView() {
  const [cards, setCards] = useState(null);
  const [quiz, setQuiz] = useState(null);
  const [idx, setIdx] = useState(0);
  const [score, setScore] = useState(0);
  const [record, setRecord] = useState(0);
  const [selected, setSelected] = useState(null);
  const [locked, setLocked] = useState(false);
  const [finished, setFinished] = useState(false);

  const startQuiz = useCallback((cardList) => {
    setQuiz(buildQuizQuestions(cardList));
    setIdx(0);
    setScore(0);
    setSelected(null);
    setLocked(false);
    setFinished(false);
  }, []);

  useEffect(() => {
    (async () => {
      const loaded = await getOrSeedCards();
      const rec = await loadQuizRecord();
      setRecord(rec);
      setCards(loaded);
      if (loaded.length >= 4) startQuiz(loaded);
    })();
  }, [startQuiz]);

  const current = quiz && quiz[idx];

  const handleSelect = (option) => {
    if (locked || !current) return;
    setSelected(option);
    setLocked(true);
    const isCorrect = option === current.correct;
    const newScore = isCorrect ? score + 1 : score;
    if (isCorrect) setScore(newScore);

    setTimeout(async () => {
      if (idx + 1 < quiz.length) {
        setIdx((i) => i + 1);
        setSelected(null);
        setLocked(false);
      } else {
        if (newScore > record) {
          setRecord(newScore);
          await saveQuizRecord(newScore);
        }
        setFinished(true);
      }
    }, 800);
  };

  if (cards === null) {
    return (
      <div className="flex-1 flex items-center justify-center">
        <Loader2 className="animate-spin" color={COLORS.textDim} size={28} />
      </div>
    );
  }

  if (cards.length < 4) {
    return (
      <div className="flex-1 flex flex-col items-center justify-center text-center gap-3 px-6">
        <div className="rounded-full p-4" style={{ background: COLORS.surfaceAlt }}>
          <HelpCircle color={COLORS.teal} size={28} />
        </div>
        <p style={{ fontFamily: "Fraunces, serif", color: COLORS.text }} className="text-lg">
          Test uchun so'z yetarli emas
        </p>
        <p style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }} className="text-sm max-w-xs">
          Test boshlash uchun Lug'at bo'limida kamida 4 ta so'z bo'lishi kerak. Hozir {cards.length} ta so'zingiz bor.
        </p>
      </div>
    );
  }

  return (
    <div className="flex-1 flex flex-col px-5 pt-3 pb-4">
      <h1 style={{ fontFamily: "Fraunces, serif", color: COLORS.text }} className="text-2xl mb-4">Test</h1>

      {!finished && current && (
        <>
          <div className="flex gap-3 mb-3">
            <div className="flex-1 rounded-2xl p-3" style={{ background: COLORS.surfaceAlt }}>
              <p style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }} className="text-xs">To'g'ri javob</p>
              <p style={{ color: COLORS.text, fontFamily: "Manrope, sans-serif" }} className="text-2xl font-bold">{score}</p>
            </div>
            <div className="flex-1 rounded-2xl p-3" style={{ background: COLORS.teal }}>
              <p style={{ color: "#0B1020", fontFamily: "Manrope, sans-serif" }} className="text-xs opacity-80">Rekord</p>
              <p style={{ color: "#0B1020", fontFamily: "Manrope, sans-serif" }} className="text-2xl font-bold">{record}</p>
            </div>
          </div>
          <p style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }} className="text-sm text-center mb-4">
            Savol: {idx + 1}/{quiz.length}
          </p>

          <div className="rounded-2xl p-6 mb-5 flex flex-col items-center gap-2" style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}` }}>
            {current.pos && (
              <span
                className="text-xs px-3 py-1 rounded-full font-medium"
                style={{ background: COLORS.surfaceAlt, color: COLORS.amber, fontFamily: "Manrope, sans-serif" }}
              >
                {current.pos}
              </span>
            )}
            <span style={{ fontFamily: "Fraunces, serif", color: COLORS.text }} className="text-3xl text-center mt-1">
              {current.word}
            </span>
          </div>

          <div className="flex flex-col gap-3">
            {current.options.map((opt, i) => {
              const isCorrectOpt = opt === current.correct;
              const isSelectedOpt = opt === selected;
              let bg = COLORS.surfaceAlt;
              let border = COLORS.border;
              if (locked && isCorrectOpt) {
                bg = "rgba(47,217,196,0.16)";
                border = COLORS.teal;
              } else if (locked && isSelectedOpt && !isCorrectOpt) {
                bg = "rgba(242,101,125,0.16)";
                border = COLORS.coral;
              }
              return (
                <button
                  key={i}
                  onClick={() => handleSelect(opt)}
                  disabled={locked}
                  className="w-full rounded-2xl p-4 flex items-center gap-3 text-left"
                  style={{ background: bg, border: `1px solid ${border}` }}
                >
                  <span
                    className="rounded-lg w-8 h-8 flex items-center justify-center font-bold text-sm shrink-0"
                    style={{ background: COLORS.bg, color: COLORS.text, fontFamily: "Manrope, sans-serif" }}
                  >
                    {OPTION_LETTERS[i]}
                  </span>
                  <span style={{ color: COLORS.text, fontFamily: "Manrope, sans-serif" }} className="text-base">
                    {opt}
                  </span>
                </button>
              );
            })}
          </div>
        </>
      )}

      {finished && (
        <div className="flex-1 flex flex-col items-center justify-center text-center gap-3">
          <div className="rounded-full p-4" style={{ background: COLORS.surfaceAlt }}>
            <Check color={COLORS.teal} size={28} />
          </div>
          <p style={{ fontFamily: "Fraunces, serif", color: COLORS.text }} className="text-2xl">
            {score}/{quiz.length} to'g'ri
          </p>
          <p style={{ color: COLORS.textDim, fontFamily: "Manrope, sans-serif" }} className="text-sm">
            {score > record ? "Yangi rekord qo'ydingiz! 🎉" : `Rekordingiz: ${record}`}
          </p>
          <button
            onClick={() => startQuiz(cards)}
            className="mt-3 rounded-xl px-6 py-3 font-semibold flex items-center gap-2"
            style={{ background: COLORS.teal, color: "#0B1020", fontFamily: "Manrope, sans-serif" }}
          >
            Qayta boshlash
          </button>
        </div>
      )}
    </div>
  );
}


function App() {
  const [tab, setTab] = useState("cards");
  const [userName, setUserName] = useState(undefined);
  const [showSettings, setShowSettings] = useState(false);

  useEffect(() => {
    (async () => {
      const name = await loadUserName();
      setUserName(name || null);
    })();
  }, []);

  if (userName === undefined) {
    return (
      <div className="w-full flex justify-center items-center" style={{ background: "#05060D", minHeight: 640 }}>
        <Loader2 className="animate-spin" color={COLORS.textDim} size={28} />
      </div>
    );
  }

  return (
    <div className="w-full flex justify-center" style={{ background: "#05060D", minHeight: 640 }}>
      <style>{FONT_STYLE}</style>
      <div
        className="w-full max-w-sm flex flex-col"
        style={{ background: COLORS.bg, minHeight: 640, maxHeight: 860 }}
      >
        {userName === null ? (
          <WelcomeScreen onDone={(name) => setUserName(name)} />
        ) : (
          <>
            <Header userName={userName} onOpenSettings={() => setShowSettings(true)} />
            {tab === "cards" && <FlashcardsView />}
            {tab === "article" && <ArticlesView />}
            {tab === "quiz" && <QuizView />}
            {tab === "write" && <WritingView />}

            <div className="flex" style={{ borderTop: `1px solid ${COLORS.border}`, background: COLORS.surface }}>
              <Tab active={tab === "cards"} onClick={() => setTab("cards")} icon={<Layers size={20} />} label="Lug'at" />
              <Tab active={tab === "article"} onClick={() => setTab("article")} icon={<BookOpen size={20} />} label="Maqola" />
              <Tab active={tab === "quiz"} onClick={() => setTab("quiz")} icon={<HelpCircle size={20} />} label="Test" />
              <Tab active={tab === "write"} onClick={() => setTab("write")} icon={<PenLine size={20} />} label="Yozuv" />
            </div>
            {showSettings && <SettingsModal onClose={() => setShowSettings(false)} />}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
